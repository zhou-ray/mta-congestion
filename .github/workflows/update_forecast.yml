name: Update Forecast

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: echo "SOCRATA_APP_TOKEN=${{ secrets.SOCRATA_APP_TOKEN }}" > .env

      - name: Download 2023 data
        run: python -m backfill

      - name: Run forecast
        run: python -m forecast

      - name: Generate forecast tool
        run: python generate_forecast_tool.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add visualizations/forecast.html visualizations/forecast_data.json
          git diff --staged --quiet || git commit -m "chore: update forecast $(date +%Y-%m-%d)"
          git push
